<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dashboard — Agentes</title>
  <style>
    :root {
      --bg: #08101a;
      --panel: #0e1720;
      --card: #0f1a24;
      --card-2: #111827;
      --accent: #f59e0b;
      --accent-2: #ffb86b;
      --muted: #94a3b8;
      --glass: rgba(255, 255, 255, 0.04);
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #f59e0b;
      --text: #e6eef8;
      --line: rgba(255, 255, 255, 0.06);
    }

    * {
      box-sizing: border-box;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      background:
        radial-gradient(circle at top, rgba(245, 158, 11, 0.08), transparent 28%),
        linear-gradient(180deg, #07111f 0%, #08101a 100%);
      color: var(--text);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 22px;
      border-bottom: 1px solid var(--line);
      background: rgba(8, 16, 26, 0.88);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    h1 {
      font-size: 20px;
      margin: 0;
      font-weight: 900;
      letter-spacing: 0.3px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .select,
    .input,
    select,
    textarea {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--line);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 12px;
      transition: .18s ease;
    }

    .select:hover,
    .input:hover,
    select:hover,
    textarea:hover {
      border-color: rgba(245, 158, 11, 0.35);
    }

    .select:focus,
    .input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.12);
    }

    .btn {
      background: linear-gradient(180deg, var(--accent), var(--accent-2));
      border: none;
      color: #08101a;
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 800;
      transition: transform .15s ease, box-shadow .15s ease, opacity .15s ease;
      box-shadow: 0 8px 20px rgba(245, 158, 11, 0.22);
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(245, 158, 11, 0.30);
    }

    .btn.ghost {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--line);
      color: var(--text);
      box-shadow: none;
    }

    .btn.ghost:hover {
      border-color: rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.05);
    }

    .container {
      max-width: 1280px;
      margin: 20px auto;
      padding: 14px;
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 18px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
    }

    .search {
      flex: 1;
      min-width: 220px;
    }

    /* grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
    }

    /* card */
    .card-wrap {
      position: relative;
    }

    .card {
      position: relative;
      background: linear-gradient(180deg, rgba(15, 26, 36, 0.98), rgba(17, 24, 39, 0.98));
      border-radius: 16px;
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 8px 20px rgba(2, 6, 23, 0.45);
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
      display: flex;
      flex-direction: column;
      height: 320px;
      overflow: hidden;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.52);
      border-color: rgba(245, 158, 11, 0.18);
    }

    .card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 12px;
      bottom: 12px;
      width: 4px;
      border-radius: 0 999px 999px 0;
      background: linear-gradient(180deg, var(--accent), #ff8c42);
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      background: linear-gradient(135deg, #1f2d3d, #16324a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 17px;
      color: var(--accent);
      box-shadow: inset 0 -6px 14px rgba(0, 0, 0, 0.35);
      flex-shrink: 0;
    }

    .agent {
      font-weight: 800;
      font-size: 13px;
      line-height: 1.15;
    }

    .ext {
      font-size: 11px;
      color: var(--muted);
      margin-top: 1px;
    }

    .state {
      font-weight: 900;
      font-size: 13px;
      letter-spacing: 0.2px;
    }

    .stats {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .stat {
      flex: 1;
      background: rgba(255, 255, 255, 0.03);
      padding: 8px 6px;
      border-radius: 10px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.03);
    }

    .stat .label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 3px;
    }

    .stat .value {
      font-weight: 900;
      font-size: 14px;
      color: var(--text);
    }

    .note {
      margin-top: 8px;
      padding: 8px 10px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.025);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.3;
      border: 1px solid rgba(255, 255, 255, 0.03);
    }

    .note strong {
      color: var(--text);
      display: inline-block;
      margin-bottom: 3px;
    }

    .note button {
      margin-top: 6px;
      width: 100%;
      padding: 7px 10px;
      font-size: 12px;
    }

    .obs-box {
      min-height: 54px;
      max-height: 54px;
      overflow: hidden;
    }

    .doc-box {
      min-height: 58px;
      max-height: 58px;
      overflow: hidden;
    }

    .doc-box .btn {
      width: 100%;
      margin-top: 6px;
    }

    .card .note:last-child {
      margin-top: auto;
    }

    /* right panel */
    .panel {
      position: fixed;
      right: 18px;
      top: 84px;
      width: 380px;
      max-width: 92%;
      background: linear-gradient(180deg, #071028, #0b1224);
      border-radius: 18px;
      padding: 16px;
      border: 1px solid var(--line);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
      display: none;
      z-index: 1200;
    }

    .panel.show {
      display: block;
    }

    .panel .title {
      font-weight: 900;
      font-size: 18px;
    }

    .panel .row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-top: 10px;
    }

    /* modal */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(3, 7, 18, 0.72);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1400;
      backdrop-filter: blur(4px);
    }

    .overlay.show {
      display: flex;
    }

    .modal {
      width: 720px;
      max-width: 94%;
      background: linear-gradient(180deg, #0b1220, #071028);
      padding: 20px;
      border-radius: 18px;
      border: 1px solid var(--line);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .form-row {
      display: flex;
      gap: 12px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    .counter-row {
      display: flex;
      gap: 12px;
    }

    .counter {
      flex: 1;
      background: linear-gradient(180deg, #07111a, #091525);
      padding: 12px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .counter label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .counter input {
      width: 100%;
      text-align: center;
      padding: 8px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      background: rgba(255, 255, 255, 0.02);
      color: var(--text);
    }

    /* pdf */
    .pdf-controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .small-muted {
      font-size: 12px;
      color: var(--muted);
    }

    select option {
      background: #0b1224;
      color: #ffffff;
    }

    #pdfModal>div {
      width: 82%;
      height: 82%;
      background: #0b1224;
      border-radius: 16px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--line);
      box-shadow: 0 20px 60px rgba(0, 0, 0, .45);
    }

    #pdfViewer {
      flex: 1;
      border: none;
      border-radius: 10px;
      background: white;
    }

    @media (max-width: 800px) {
      .modal {
        width: 95%;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .controls {
        padding: 12px;
      }

      header {
        padding: 12px 14px;
      }

      h1 {
        font-size: 17px;
      }
    }
  </style>
</head>

    </div>
    <div style="display:flex;justify-content:flex-end;margin-top:12px"><button id="panelEditBtn" class="btn">Editar
        (Shift+R)</button></div>
  </div>
  <div id="overlay" class="overlay">

        </div>
        <div class="form-group">
          <label class="small-muted">Observaciones</label>
          <textarea id="formObs" class="input"></textarea>
        </div>
        <div class="form-group">

        </div>
        <div style="grid-column:1/3">

          <button id="closeBtn" class="btn ghost">Cerrar</button>

    const today = new Date().toISOString().split('T')[0];
    pdfDateFrom.value = today; pdfDateTo.value = today; formDate.value = today;

    function initSelects() {
      agentes.forEach(a => {
        const o = document.createElement('option'); o.value = String(a.ext); o.textContent = `${a.nombre} — ${a.ext}`; pdfAgentFilter.appendChild(o);
        const o2 = document.createElement('option'); o2.value = String(a.ext); o2.textContent = `${a.nombre} — ${a.ext}`; formAgent.appendChild(o2);
      });
    }
    initSelects();
    let registros = [];

    db.collection("agentes_sabado").onSnapshot((snap) => {

      registros = [];

      snap.forEach(doc => {
        registros.push({
          id: doc.id,
          ...doc.data()
        });
      });

      renderGrid();

    });

    function toMinutes(h) { if (!h) return null; const p = h.split(':').map(Number); if (p.length < 2 || p.some(isNaN)) return null; return p[0] * 60 + p[1]; }
    function esc(s) { if (!s) return ''; return String(s).replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;'); }
    function formatearSegundos(segundos) {
      const total = Number(segundos || 0);
      const min = Math.floor(total / 60);
      const sec = total % 60;
      return `${min}:${String(sec).padStart(2, "0")}`;
    }
    function renderGrid() {

      const q = searchInput.value.trim().toLowerCase();
      const filter = filterSelect.value;

      const selectedAgent = pdfAgentFilter.value;
      const from = pdfDateFrom.value;
      const to = pdfDateTo.value;

      grid.innerHTML = "";

      registros.forEach(rec => {

        const ext = String(rec.extension);
        const name = rec.nombre;

        const login = rec.login || "";
        const logout = rec.logout || "";
        const tiempoBanio = rec.tiempoBanio ?? 0;
        const tiempoAlmuerzo = rec.tiempoAlmuerzo ?? 0;
        const salientes = rec.salientes ?? 0;
        const entrantes = rec.entrantes ?? 0;
        const obs = rec.observaciones || "";

        const agent = agentes.find(a => String(a.ext) === ext);
        const horario = agent ? obtenerHorarioAgente(agent) : "08:00";
        if (selectedAgent !== "all" && ext !== selectedAgent) return;

        if (from) {
          if (rec.fecha < from) return;
        }

        if (to) {
          if (rec.fecha > to) return;
        }
        if (q) {
          const inName = name.toLowerCase().includes(q);
          const inExt = ext.includes(q);
          if (!inName && !inExt) return;
        }

        let estado = "Sin marcar";
        let badgeColor = "var(--muted)";

        if (login) {

          const lm = toMinutes(login);
          const hm = toMinutes(horario);

          if (lm === null) {
            estado = "Hora inválida";
            badgeColor = "var(--accent)";
          }
          else if (lm <= hm) {
            estado = "Puntual";
            badgeColor = "var(--green)";
          }
          else {
            const r = lm - hm;
            estado = `Retraso ${r} min`;
            badgeColor = r <= 5 ? "var(--accent)" : "var(--red)";
          }

        }

        if (filter === "puntual" && badgeColor !== "var(--green)") return;
        if (filter === "leve" && badgeColor !== "var(--accent)") return;
        if (filter === "retraso" && badgeColor !== "var(--red)") return;
        if (filter === "sinmarcar" && login) return;

        // tarjsta
        const wrap = document.createElement("div");
        wrap.className = "card-wrap";

        const c = document.createElement("div");
        c.className = "card";

        c.innerHTML = `
  <div class="card-header">
    <div style="display:flex;gap:10px;align-items:center">
      <div class="avatar">${name.charAt(0)}</div>
      <div>
        <div class="agent">${esc(name)}</div>
        <div class="ext">Ext ${ext} • ${rec.fecha}</div>
      </div>
    </div>

    <div style="text-align:right">
      <div class="state" style="color:${badgeColor}">${estado}</div>
      <div class="ext">${login || "-"} • ${logout || "-"}</div>
    </div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="label">Baño</div>
      <div class="value">${formatearSegundos(rec.tiempoBanio || 0)}</div>
    </div>

    <div class="stat">
      <div class="label">Almuerzo</div>
      <div class="value">${formatearSegundos(rec.tiempoAlmuerzo || 0)}</div>
    </div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="label">Salientes</div>
      <div class="value">${salientes}</div>
    </div>

    <div class="stat">
      <div class="label">Entrantes</div>
      <div class="value">${entrantes}</div>
    </div>
  </div>

  <div class="note obs-box">
    <strong>Observaciones:</strong><br>
    ${esc(obs || "Sin observaciones")}
  </div>

  <div class="note doc-box">
    <strong>Documento adjunto:</strong><br>
    ${rec.pdf ? `<button onclick="event.stopPropagation(); abrirPDF('${rec.pdf}')" class="btn ghost">📎 Ver PDF</button>` : "Sin documento adjunto"}
  </div>
`;

        wrap.appendChild(c);
        grid.appendChild(wrap);
        c.style.cursor = "pointer";
        c.addEventListener("click", () => {
          showModal(rec.id);
        });
      });

    }
    function openPanel(ext) { const agent = agentes.find(a => String(a.ext) === String(ext)); const rec = latestData[String(ext)] || {}; panelName.textContent = agent.nombre; panelExt.textContent = 'Ext: ' + agent.ext + (rec.fecha ? ' • ' + rec.fecha : ''); panelTimes.textContent = `${rec.login || '-'} • ${rec.logout || '-'}`; panelSalientes.textContent = rec.salientes ?? 0; panelEntrantes.textContent = rec.entrantes ?? 0; panelObs.textContent = rec.observaciones || 'Sin observación'; panelState.textContent = (() => { if (!rec.login) return 'Sin marcar'; const lm = toMinutes(rec.login); if (lm === null) return 'Hora inválida'; if (lm <= 8 * 60) return 'Puntual'; const r = lm - 8 * 60; return 'Retraso ' + r + ' min'; })(); rightPanel.classList.add('show'); panelEditBtn.onclick = () => showModal(ext); }

    // modal
    function showModal(docId) {
      overlayEl.classList.add('show');

      let rec = null;

      if (docId) {
        rec = registros.find(r => r.id === docId);
      }

      if (rec) {
        formAgent.value = String(rec.extension);
        formExt.value = String(rec.extension);
        formDate.value = rec.fecha || today;
        formLogin.value = rec.login || '';
        formLogout.value = rec.logout || '';
        formSalientes.value = rec.salientes ?? '';
        formEntrantes.value = rec.entrantes ?? '';
        formObs.value = rec.observaciones || '';
        saveBtn.dataset.editingId = rec.id;
      } else {
        const sel = formAgent.value || String(agentes[0].ext);
        formAgent.value = sel;
        formExt.value = sel;
        formDate.value = today;
        formLogin.value = '';
        formLogout.value = '';
        formSalientes.value = '';
        formEntrantes.value = '';
        formObs.value = '';
        saveBtn.dataset.editingId = '';
      }

      document.getElementById("formPdf").value = "";
    } function hideModal() { overlayEl.classList.remove('show'); }

    //  modal agent select
    function initModal() { agentes.forEach(a => { const o = document.createElement('option'); o.value = String(a.ext); o.textContent = `${a.nombre} — ${a.ext}`; formAgent.appendChild(o); }); }
    initModal();

    // shortcuts
    document.addEventListener('keydown', (e) => { if (e.shiftKey && (e.key === 'R' || e.key === 'r')) { showModal(); } });
    floatingBtn.addEventListener('click', () => showModal());
    closeBtn.addEventListener('click', hideModal);
    formAgent.addEventListener('change', () => formExt.value = formAgent.value);

    // save
    saveBtn.addEventListener('click', async () => {
      const pdfFile = document.getElementById("formPdf").files[0];
      let pdfBase64 = "";

      const ext = String(formAgent.value);
      const agent = agentes.find(a => String(a.ext) === ext);
      if (!agent) {
        alert('Agente inválido');
        return;
      }

      const login = formLogin.value.trim();
      if (!login) {
        alert('Ingresa Log in');
        return;
      }

      const logout = formLogout.value.trim();
      const salientes = Number(formSalientes.value || 0);
      const entrantes = Number(formEntrantes.value || 0);
      const obs = formObs.value.trim();
      const fecha = formDate.value || today;

      try {
        const docId = `${ext}_${fecha}`;

        const existente = registros.find(r => r.id === docId);
        let pdfFinal = existente?.pdf || "";

        if (pdfFile) {
          const reader = new FileReader();
          pdfBase64 = await new Promise((resolve) => {
            reader.onload = () => resolve(reader.result);
            reader.readAsDataURL(pdfFile);
          });
          pdfFinal = pdfBase64;
        }

        await db.collection('agentes_sabado').doc(docId).set({
          nombre: agent.nombre,
          extension: Number(ext),
          fecha,
          login,
          logout,
          salientes,
          entrantes,
          observaciones: obs,
          pdf: pdfFinal,
          tiempoBanio: existente?.tiempoBanio ?? 0,
          tiempoAlmuerzo: existente?.tiempoAlmuerzo ?? 0,
          tiempoBanioTexto: existente?.tiempoBanioTexto ?? "0:00",
          tiempoAlmuerzoTexto: existente?.tiempoAlmuerzoTexto ?? "0:00",
          timestamp: Date.now()
        }, { merge: true });

        hideModal();
      } catch (err) {
        console.error('Guardar', err);
        alert('Error al guardar. Revise consola.');
      }
    });

    // filters
    searchInput.addEventListener('input', renderGrid);
    filterSelect.addEventListener('change', renderGrid);
    compactCheckbox.addEventListener('change', renderGrid);
    pdfAgentFilter.addEventListener('change', renderGrid);
    pdfDateFrom.addEventListener('change', renderGrid);
    pdfDateTo.addEventListener('change', renderGrid);
    // pdf
    document.getElementById('downloadPdfBtn').addEventListener('click', async () => {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF('p', 'mm', 'a4');

      const from = pdfDateFrom.value;
      const to = pdfDateTo.value;
      const selected = pdfAgentFilter.value;

      const rows = [];

      const registrosFiltrados = registros
        .filter(rec => {
          const ext = String(rec.extension);

          if (selected !== 'all' && ext !== String(selected)) return false;
          if (from && rec.fecha < from) return false;
          if (to && rec.fecha > to) return false;

          return true;
        })
        .sort((a, b) => {
          if (a.fecha === b.fecha) return String(a.extension).localeCompare(String(b.extension));
          return a.fecha.localeCompare(b.fecha);
        });

      registrosFiltrados.forEach(rec => {
        const agent = agentes.find(a => String(a.ext) === String(rec.extension));
        const horario = agent ? obtenerHorarioAgente(agent) : "08:00";

        let estado = 'Sin marcar';

        if (rec.login) {
          const lm = toMinutes(rec.login);
          const hm = toMinutes(horario || "08:00");

          if (lm === null) {
            estado = 'Hora inválida';
          } else if (lm <= hm) {
            estado = 'Puntual';
          } else {
            const r = lm - hm;
            estado = 'Retraso ' + r + ' min';
          }
        }

        rows.push({
          main: [
            rec.nombre || '',
            rec.extension || '',
            rec.fecha || '',
            rec.login || '',
            rec.logout || '',
            rec.tiempoBanioTexto || '0:00',
            rec.tiempoAlmuerzoTexto || '0:00',
            rec.salientes || 0,
            rec.entrantes || 0,
            estado
          ],
          obs: rec.observaciones || ''
        });
      });

      doc.setFontSize(14);
      doc.text('Reporte De Agentes', 105, 14, null, null, 'center');

      doc.setFontSize(10);
      doc.text(`Rango: ${from || '...'} a ${to || '...'}`, 105, 20, null, null, 'center');

      const body = [];

      rows.forEach(r => {
        body.push(r.main);
        body.push([{
          content: 'Observaciones: ' + (r.obs || 'Sin observación'),
          colSpan: 10,
          styles: { halign: 'left' }
        }]);
      });

      doc.autoTable({
        startY: 26,
        head: [['Nombre', 'Ext', 'Fecha', 'Log in', 'Log out', 'Baño', 'Almuerzo', 'Salientes', 'Entrantes', 'Estado']],
        body: body,
        styles: { fontSize: 8, cellPadding: 3, halign: 'center', valign: 'middle' },
        headStyles: { fillColor: [37, 99, 235], textColor: 255 },

        didParseCell: function (data) {
          if (data.section === 'body' && data.column.index === 9) {
            const val = String(data.cell.raw || '');
            if (val.startsWith('Retraso')) data.cell.styles.textColor = [220, 38, 38];
            if (val === 'Sin marcar') data.cell.styles.textColor = [130, 130, 130];
          }

          if (
            data.section === 'body' &&
            typeof data.cell.raw === 'string' &&
            data.cell.raw.startsWith('Observaciones:')
          ) {
            data.cell.styles.halign = 'left';
            data.cell.styles.fontStyle = 'italic';
            data.cell.styles.textColor = [200, 200, 200];
          }
        }
      });

      doc.save(`reporte_agentes_${from || 'all'}_a_${to || 'all'}.pdf`);
    });
    function abrirPDF(base64) {

      const modal = document.getElementById("pdfModal");
      const viewer = document.getElementById("pdfViewer");

      viewer.src = base64;
      modal.style.display = "flex";

    }

    function cerrarPDF() {

      const modal = document.getElementById("pdfModal");
      const viewer = document.getElementById("pdfViewer");

      viewer.src = "";
      modal.style.display = "none";

    }
    // initial render
    renderGrid();
  </script>
</body>

</html>
