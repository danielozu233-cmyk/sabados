<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dashboard — Agentes Sabatino</title>
  <style>
    :root {
      --bg: #08101a;
      --panel: #0e1720;
      --card: #0f1a24;
      --card-2: #111827;
      --accent: #f59e0b;
      /* naranja/amarillo */
      --accent-2: #ffb86b;
      --muted: #9aa6b2;
      --glass: rgba(255, 255, 255, 0.04);
      --green: #16a34a;
      --red: #ef4444;
      --text: #e6eef8;
    }

    * {
      box-sizing: border-box;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial
    }

    html,
    body {
      height: 100%;
      margin: 0;
      background: linear-gradient(180deg, #071026 0%, #07111b 100%);
      color: var(--text)
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 18px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.01), transparent)
    }

    h1 {
      font-size: 18px;
      margin: 0;
      font-weight: 800
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px
    }

    .select,
    .input {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.04);
      color: var(--text);
      padding: 8px;
      border-radius: 8px
    }

    .btn {
      background: linear-gradient(180deg, var(--accent), var(--accent-2));
      border: none;
      color: #08101a;
      padding: 8px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 800
    }

    .btn.ghost {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: var(--muted)
    }

    .container {
      max-width: 1200px;
      margin: 18px auto;
      padding: 12px
    }

    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 12px
    }

    .search {
      flex: 1;
      min-width: 180px
    }

    /* grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px
    }

    /* card */
    .card {
      background: linear-gradient(180deg, var(--card), var(--card-2));
      border-radius: 12px;
      padding: 14px;
      border: 1px solid rgba(255, 255, 255, 0.03);
      box-shadow: 0 6px 18px rgba(2, 6, 23, 0.6);
      transition: transform .15s, box-shadow .15s
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.7)
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: linear-gradient(135deg, #242f3a, #16324a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      color: var(--accent);
      box-shadow: inset 0 -6px 18px rgba(0, 0, 0, 0.4)
    }

    .agent {
      font-weight: 800
    }

    .ext {
      font-size: 12px;
      color: var(--muted)
    }

    .state {
      font-weight: 800
    }

    .stats {
      display: flex;
      gap: 8px;
      margin-top: 10px
    }

    .stat {
      flex: 1;
      background: rgba(255, 255, 255, 0.02);
      padding: 8px;
      border-radius: 8px;
      text-align: center
    }

    .stat .label {
      font-size: 12px;
      color: var(--muted)
    }

    .stat .value {
      font-weight: 800;
      margin-top: 4px
    }

    .note {
      margin-top: 10px;
      padding: 8px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.02);
      color: var(--muted);
      font-size: 13px
    }

    /* colorful left border to distinguish cards */
    .card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 6px;
      border-radius: 12px 0 0 12px;
      background: linear-gradient(180deg, var(--accent), #ff8c42);
      transform: translateX(-8px);
      opacity: 0.95
    }

    .card-wrap {
      position: relative
    }

    /* right panel */
    .panel {
      position: fixed;
      right: 18px;
      top: 80px;
      width: 380px;
      max-width: 92%;
      background: linear-gradient(180deg, #071028, #0b1224);
      border-radius: 12px;
      padding: 14px;
      border-left: 1px solid rgba(255, 255, 255, 0.03);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
      display: none;
      z-index: 1200
    }

    .panel.show {
      display: block
    }

    .panel .title {
      font-weight: 800
    }

    .panel .row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-top: 8px
    }

    /* modal */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(3, 7, 18, 0.65);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1400
    }

    .overlay.show {
      display: flex
    }

    .modal {
      width: 720px;
      max-width: 94%;
      background: linear-gradient(180deg, #0b1220, #071028);
      padding: 18px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6)
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px
    }

    .form-row {
      display: flex;
      gap: 12px
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px
    }

    .input,
    select,
    textarea {
      width: 100%;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      background: transparent;
      color: var(--text)
    }

    textarea {
      min-height: 100px
    }

    /* specifically space out salientes/entrantes to avoid amontonado */
    .counter-row {
      display: flex;
      gap: 12px
    }

    .counter {
      flex: 1;
      background: linear-gradient(180deg, #07111a, #091525);
      padding: 10px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.03);
      display: flex;
      flex-direction: column;
      align-items: center
    }

    .counter label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px
    }

    .counter input {
      width: 100%;
      text-align: center;
      padding: 6px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.03);
      background: transparent;
      color: var(--text)
    }

    /* responsive modal layout for small screens */
    @media (max-width:800px) {
      .modal {
        width: 95%;
      }

      .form-grid {
        grid-template-columns: 1fr
      }
    }

    /* pdf controls small */
    .pdf-controls {
      display: flex;
      gap: 8px;
      align-items: center
    }

    .small-muted {
      font-size: 12px;
      color: var(--muted)
    }
  </style>
</head>

<body>
  <header>
    <div style="display:flex;gap:12px;align-items:center">
      <h1>Agentes Sabatino — Dashboard</h1>
    </div>
    <div class="header-right">
      <div class="pdf-controls">
        <select id="pdfAgentFilter" class="select">
          <option value="all">Todos</option>
        </select>
        <input id="pdfDateFrom" type="date" class="input" />
        <input id="pdfDateTo" type="date" class="input" />
        <button id="downloadPdfBtn" class="btn">Descargar PDF</button>
      </div>
    </div>
  </header>
  <main class="container">
    <div class="controls">
      <input id="searchInput" class="input search" placeholder="Buscar por nombre o extensión..." />
      <select id="filterSelect" class="select">
        <option value="all">Todos</option>
        <option value="puntual">Puntuales</option>
        <option value="leve">Leves (≤5 min)</option>
        <option value="retraso">Retraso (&gt;5 min)</option>
        <option value="sinmarcar">Sin marcar</option>
      </select>
      <label class="small-muted">Compact</label>
      <input type="checkbox" id="compactCheckbox" />
      <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
        <div class="small-muted">Shift+R para registrar/editar</div>
        <button id="floatingBtn" class="btn">Registrar</button>
      </div>
    </div>

    <div id="grid" class="grid" aria-live="polite"></div>
  </main>
  <!-- right panel -->
  <div id="rightPanel" class="panel" aria-hidden="true">
    <div class="title" id="panelName">Agente</div>
    <div class="row">
      <div class="small-muted" id="panelExt">Ext: -</div>
      <div id="panelState" class="state">Estado</div>
    </div>
    <div class="row">
      <div class="small-muted" id="panelTimes">- • -</div>
      <div></div>
    </div>
    <div style="margin-top:12px">
      <div class="small-muted">Salientes: <strong id="panelSalientes">0</strong></div>
      <div class="small-muted">Entrantes: <strong id="panelEntrantes">0</strong></div>
    </div>
    <div style="margin-top:12px">
      <div class="small-muted" style="font-weight:700">Observaciones</div>
      <div id="panelObs" style="margin-top:6px;color:var(--accent-2);line-height:1.2">Sin observación</div>
    </div>
    <div style="display:flex;justify-content:flex-end;margin-top:12px"><button id="panelEditBtn" class="btn">Editar
        (Shift+R)</button></div>
  </div>
  <!-- modal -->
  <div id="overlay" class="overlay">
    <div class="modal" role="dialog" aria-modal="true">
      <h3 style="margin:0 0 8px 0">Registrar / Editar agente</h3>
      <div class="form-grid">
        <div class="form-group">
          <label class="small-muted">Agente</label>
          <select id="formAgent" class="input"></select>
        </div>
        <div class="form-group">
          <label class="small-muted">Extensión</label>
          <input id="formExt" class="input" readonly />
        </div>
        <div class="form-group">
          <label class="small-muted">Fecha</label>
          <input id="formDate" type="date" class="input" />
        </div>
        <div class="form-group">
          <label class="small-muted">Observaciones</label>
          <textarea id="formObs" class="input"></textarea>
        </div>
        <div style="grid-column:1/3">
          <div class="form-row">
            <div style="flex:1">
              <label class="small-muted">Log in</label>
              <input id="formLogin" type="time" class="input" />
            </div>
            <div style="flex:1">
              <label class="small-muted">Log out</label>
              <input id="formLogout" type="time" class="input" />
            </div>
          </div>
        </div>
        <div style="grid-column:1/3">
          <div class="counter-row">
            <div class="counter">
              <label>Salientes</label>
              <input id="formSalientes" type="number" min="0" />
            </div>
            <div class="counter">
              <label>Entrantes</label>
              <input id="formEntrantes" type="number" min="0" />
            </div>
          </div>
        </div>
        <div style="grid-column:1/3;display:flex;justify-content:flex-end;gap:8px;margin-top:6px">
          <button id="saveBtn" class="btn">Guardar</button>
          <button id="closeBtn" class="btn ghost">Cerrar</button>
        </div>
      </div>
    </div>
  </div>
  <!-- libs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

  <script>
    // Firebase — opción B: estructura limpia y consistente (recomendada)
    const firebaseConfig = {
      apiKey: "AIzaSyDeAbygOcoV1G9Zh8wd7topjXttlmJ892Y",
      authDomain: "workplace-18675.firebaseapp.com",
      projectId: "workplace-18675",
      storageBucket: "workplace-18675.appspot.com",
      messagingSenderId: "606737102100",
      appId: "1:606737102100:web:7084120bdabf1f8ca2be01"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // agentes (usaré tu lista; mantenla actualizada aquí si agregas más)
    const agentes = [
      { nombre: "Sarahi Churumia", ext: 8001, horario: "07:00" },
      { nombre: "Justa Jaes", ext: 8002, horario: "09:00"},
      { nombre: "Javier Alvarez", ext: 8003,horario: "07:00" },
      { nombre: "Mónica Ordónez", ext: 8005, horario: "09:00" },
      { nombre: "Alejandro Vásquez", ext: 8006, horario: "07:00"  },
      { nombre: "Joselyne Velásquez", ext: 8007, horario: "09:00"  },
      { nombre: "Jackeline Castillo", ext: 8008, horario: "07:00"  },
      { nombre: "Mildred Cordero", ext: 8009, horario: "07:00" },
      { nombre: "Tania de León", ext: 8010, horario: "07:00"  },
      { nombre: "Anthony García", ext: 8011, horario: "09:00" },
      { nombre: "Jorge Veliz", ext: 8013, horario: "09:00"  },
      { nombre: "Néstor Galvez", ext: 8015, horario: "07:00"  },
      { nombre: "Andrea Jiménez", ext: 8016, horario: "09:00" },
      { nombre: "Diego Chiché", ext: 8017, horario: "09:00"  },
      { nombre: "Ashley López", ext: 8018, horario: "07:00"  },
      { nombre: "Synndy Sanchez", ext: 8020, horario: "09:00" },
      { nombre: "Mishell de León", ext: 8021, horario: "07:00" },
      { nombre: "Omar Ramirez", ext: 8022, horario: "08:00"},
      { nombre: "Madelin Ovando", ext: 8023, horario: "09:00" },
      { nombre: "Evelyn de León", ext: 8024, horario: "07:00" },
      { nombre: "Bryan Hernandez", ext: 8026, horario: "09:00" },
      { nombre: "Rafael Sánchez", ext: 8027, horario: "07:00" },
      { nombre: "Marta Morales", ext: 8028, horario: "07:00" },
      { nombre: "Pablo Ibañez", ext: 8029, horario: "07:00" },
      { nombre: "María Perdomo", ext: 8030, horario: "09:00" }
    ];

    // DOM
    const grid = document.getElementById('grid');
    const pdfAgentFilter = document.getElementById('pdfAgentFilter');
    const pdfDateFrom = document.getElementById('pdfDateFrom');
    const pdfDateTo = document.getElementById('pdfDateTo');
    const searchInput = document.getElementById('searchInput');
    const filterSelect = document.getElementById('filterSelect');
    const compactCheckbox = document.getElementById('compactCheckbox');
    const floatingBtn = document.getElementById('floatingBtn');

    const overlayEl = document.getElementById('overlay');
    const formAgent = document.getElementById('formAgent');
    const formExt = document.getElementById('formExt');
    const formDate = document.getElementById('formDate');
    const formLogin = document.getElementById('formLogin');
    const formLogout = document.getElementById('formLogout');
    const formSalientes = document.getElementById('formSalientes');
    const formEntrantes = document.getElementById('formEntrantes');
    const formObs = document.getElementById('formObs');
    const saveBtn = document.getElementById('saveBtn');
    const closeBtn = document.getElementById('closeBtn');

    const rightPanel = document.getElementById('rightPanel');
    const panelName = document.getElementById('panelName');
    const panelExt = document.getElementById('panelExt');
    const panelState = document.getElementById('panelState');
    const panelTimes = document.getElementById('panelTimes');
    const panelSalientes = document.getElementById('panelSalientes');
    const panelEntrantes = document.getElementById('panelEntrantes');
    const panelObs = document.getElementById('panelObs');
    const panelEditBtn = document.getElementById('panelEditBtn');

    // defaults
    const today = new Date().toISOString().split('T')[0];
    pdfDateFrom.value = today; pdfDateTo.value = today; formDate.value = today;

    // init selects
    function initSelects() {
      agentes.forEach(a => {
        const o = document.createElement('option'); o.value = String(a.ext); o.textContent = `${a.nombre} — ${a.ext}`; pdfAgentFilter.appendChild(o);
        const o2 = document.createElement('option'); o2.value = String(a.ext); o2.textContent = `${a.nombre} — ${a.ext}`; formAgent.appendChild(o2);
      });
    }
    initSelects();

    // realtime cache
    let latestData = {}; // ext -> doc

    // listener
    function startListener() {
      db.collection('agentes_sabado').onSnapshot(snap => {
        snap.forEach(doc => { latestData[doc.id] = doc.data(); });
        renderGrid();
      }, err => { console.error('snapshot err', err); renderGrid(); });
    }
    startListener();

    // helpers
    function toMinutes(h) { if (!h) return null; const p = h.split(':').map(Number); if (p.length < 2 || p.some(isNaN)) return null; return p[0] * 60 + p[1]; }
    function esc(s) { if (!s) return ''; return String(s).replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;'); }

    // render
function renderGrid() {
  const q = searchInput.value.trim().toLowerCase();
  const filter = filterSelect.value;
  const compact = compactCheckbox.checked;
  grid.innerHTML = '';

  agentes.forEach(agent => {

    const ext = String(agent.ext);
    const data = latestData[ext] || {};
    const name = agent.nombre;
    const login = data.login || '';
    const logout = data.logout || '';
    const salientes = data.salientes ?? 0;
    const entrantes = data.entrantes ?? 0;
    const obs = data.observaciones || '';

    // search
    if (q) {
      const inName = name.toLowerCase().includes(q);
      const inExt = ext.includes(q);
      if (!inName && !inExt) return;
    }

    // estado
    let estado = 'Sin marcar';
    let badgeColor = 'var(--muted)';

    if (login) {

      const lm = toMinutes(login);
      const hm = toMinutes(agent.horario || "08:00"); // 👈 horario del agente

      if (lm === null) {
        estado = 'Hora inválida';
        badgeColor = 'var(--accent)';
      }
      else if (lm <= hm) {
        estado = 'Puntual';
        badgeColor = 'var(--green)';
      }
      else {
        const r = lm - hm;
        estado = `Retraso ${r} min`;
        badgeColor = r <= 5 ? 'var(--accent)' : 'var(--red)';
      }
    }

    // filters
    if (filter === 'puntual' && badgeColor !== 'var(--green)') return;
    if (filter === 'leve' && badgeColor !== 'var(--accent)') return;
    if (filter === 'retraso' && badgeColor !== 'var(--red)') return;
    if (filter === 'sinmarcar' && login) return;

    // 👉 aquí sigue tu código normal para crear la card...
        // build card
        const wrap = document.createElement('div'); wrap.className = 'card-wrap';
        const c = document.createElement('div'); c.className = 'card';
        c.innerHTML = `
      <div class="card-header">
        <div style="display:flex;gap:10px;align-items:center">
          <div class="avatar">${name.charAt(0)}</div>
          <div>
            <div class="agent">${esc(name)}</div>
            <div class="ext">Ext ${ext}</div>
          </div>
        </div>
        <div style="text-align:right">
          <div class="state" style="color:${badgeColor}">${esc(estado)}</div>
          <div class="ext" style="color:var(--muted);font-size:12px">${login || '-'} • ${logout || '-'}</div>
        </div>
      </div>
      <div class="stats">
        <div class="stat"><div class="label">Salientes</div><div class="value">${salientes}</div></div>
        <div class="stat"><div class="label">Entrantes</div><div class="value">${entrantes}</div></div>
      </div>
      <div class="note">${esc(obs ? (obs.length > 100 ? obs.slice(0, 97) + '...' : obs) : 'Sin observaciones')}</div>
    `;
        // click opens panel
        c.addEventListener('click', () => openPanel(ext));
        wrap.appendChild(c); grid.appendChild(wrap);
      });
    }

    function openPanel(ext) { const agent = agentes.find(a => String(a.ext) === String(ext)); const rec = latestData[String(ext)] || {}; panelName.textContent = agent.nombre; panelExt.textContent = 'Ext: ' + agent.ext + (rec.fecha ? ' • ' + rec.fecha : ''); panelTimes.textContent = `${rec.login || '-'} • ${rec.logout || '-'}`; panelSalientes.textContent = rec.salientes ?? 0; panelEntrantes.textContent = rec.entrantes ?? 0; panelObs.textContent = rec.observaciones || 'Sin observación'; panelState.textContent = (() => { if (!rec.login) return 'Sin marcar'; const lm = toMinutes(rec.login); if (lm === null) return 'Hora inválida'; if (lm <= 8 * 60) return 'Puntual'; const r = lm - 8 * 60; return 'Retraso ' + r + ' min'; })(); rightPanel.classList.add('show'); panelEditBtn.onclick = () => showModal(ext); }

    // modal
    function showModal(ext) { overlayEl.classList.add('show'); const sel = ext || formAgent.value || String(agentes[0].ext); formAgent.value = String(sel); formExt.value = String(sel); const rec = latestData[String(sel)] || {}; formDate.value = rec.fecha || today; formLogin.value = rec.login || ''; formLogout.value = rec.logout || ''; formSalientes.value = rec.salientes ?? ''; formEntrantes.value = rec.entrantes ?? ''; formObs.value = rec.observaciones || ''; }
    function hideModal() { overlayEl.classList.remove('show'); }

    // populate modal agent select
    function initModal() { agentes.forEach(a => { const o = document.createElement('option'); o.value = String(a.ext); o.textContent = `${a.nombre} — ${a.ext}`; formAgent.appendChild(o); }); }
    initModal();

    // shortcuts
    document.addEventListener('keydown', (e) => { if (e.shiftKey && (e.key === 'R' || e.key === 'r')) { showModal(); } });
    floatingBtn.addEventListener('click', () => showModal());
    closeBtn.addEventListener('click', hideModal);
    formAgent.addEventListener('change', () => formExt.value = formAgent.value);

    // save
    saveBtn.addEventListener('click', async () => {
      const ext = String(formAgent.value); const agent = agentes.find(a => String(a.ext) === ext); if (!agent) { alert('Agente inválido'); return; }
      const login = formLogin.value.trim(); if (!login) { alert('Ingresa Log in'); return; }
      const logout = formLogout.value.trim(); const salientes = Number(formSalientes.value || 0); const entrantes = Number(formEntrantes.value || 0); const obs = formObs.value.trim(); const fecha = formDate.value || today;
      try { await db.collection('agentes_sabado').doc(ext).set({ nombre: agent.nombre, extension: Number(ext), fecha, login, logout, salientes, entrantes, observaciones: obs, timestamp: Date.now() }); hideModal(); } catch (err) { console.error('Guardar', err); alert('Error al guardar. Revise consola.'); }
    });

    // filters
    searchInput.addEventListener('input', () => renderGrid()); filterSelect.addEventListener('change', () => renderGrid()); compactCheckbox.addEventListener('change', () => renderGrid()); pdfAgentFilter.addEventListener('change', () => { });

  // pdf
document.getElementById('downloadPdfBtn').addEventListener('click', async () => {

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF('p', 'mm', 'a4');

  const from = pdfDateFrom.value;
  const to = pdfDateTo.value;
  const selected = pdfAgentFilter.value;

  const rows = [];

  for (const agent of agentes) {

    if (selected !== 'all' && String(agent.ext) !== String(selected)) continue;

    const rec = latestData[String(agent.ext)];
    if (!rec) continue;

    // filtro de fechas
    if (from || to) {
      const rDate = new Date(rec.fecha || '');
      if (from && rDate < new Date(from)) continue;
      if (to && rDate > new Date(to + 'T23:59:59')) continue;
    }

    // 🔥 CALCULAR ESTADO CON HORARIO REAL
    let estado = 'Sin marcar';

    if (rec.login) {

      const lm = toMinutes(rec.login);
      const hm = toMinutes(agent.horario || "08:00");

      if (lm === null) {
        estado = 'Hora inválida';
      }
      else if (lm <= hm) {
        estado = 'Puntual';
      }
      else {
        const r = lm - hm;
        estado = 'Retraso ' + r + ' min';
      }
    }

    rows.push({
      main: [
        rec.nombre || agent.nombre,
        rec.extension || agent.ext,
        rec.fecha || '',
        rec.login || '',
        rec.logout || '',
        rec.salientes || 0,
        rec.entrantes || 0,
        estado
      ],
      obs: rec.observaciones || ''
    });
  }

  // título
  doc.setFontSize(14);
  doc.text('Reporte De Agentes Sabado', 105, 14, null, null, 'center');

  doc.setFontSize(10);
  doc.text(`Rango: ${from || '...'} a ${to || '...'}`, 105, 20, null, null, 'center');

  const body = [];

  rows.forEach(r => {
    body.push(r.main);
    body.push([{
      content: 'Observaciones: ' + (r.obs || 'Sin observación'),
      colSpan: 8,
      styles: { halign: 'left' }
    }]);
  });

  doc.autoTable({
    startY: 26,
    head: [['Nombre', 'Ext', 'Fecha', 'Log in', 'Log out', 'Salientes', 'Entrantes', 'Estado']],
    body: body,
    styles: { fontSize: 9, cellPadding: 4, halign: 'center', valign: 'middle' },
    headStyles: { fillColor: [37, 99, 235], textColor: 255 },

    didParseCell: function (data) {

      if (data.section === 'body' && data.column.index === 7) {
        const val = String(data.cell.raw || '');
        if (val.startsWith('Retraso')) data.cell.styles.textColor = [220, 38, 38];
        if (val === 'Sin marcar') data.cell.styles.textColor = [130, 130, 130];
      }

      if (data.section === 'body' &&
          typeof data.cell.raw === 'string' &&
          data.cell.raw.startsWith('Observaciones:')) {

        data.cell.styles.halign = 'left';
        data.cell.styles.fontStyle = 'italic';
        data.cell.styles.textColor = [200, 200, 200];
      }
    }
  });

  doc.save(`reporte_agentes_${from || 'all'}_a_${to || 'all'}.pdf`);
});   

    // initial render
    renderGrid();
  </script>
</body>
